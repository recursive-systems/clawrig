name: Build Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0-rc.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version from tag or input
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "CLAWRIG_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "CLAWRIG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-arm64-${{ hashFiles('mix.lock') }}
          restore-keys: docker-arm64-

      - name: Build ARM64 Elixir release
        run: |
          docker buildx build \
            -f deploy/Dockerfile.build \
            -t clawrig-build \
            --load \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            ${CLAWRIG_VERSION:+--build-arg CLAWRIG_VERSION=$CLAWRIG_VERSION} \
            .

          # Rotate cache to avoid unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          # Extract tarball and assemble bundle
          docker create --name clawrig-extract clawrig-build true 2>/dev/null || \
            (docker rm clawrig-extract && docker create --name clawrig-extract clawrig-build true)
          docker cp clawrig-extract:/app/clawrig.tar.gz deploy/clawrig.tar.gz
          docker rm clawrig-extract

          # Assemble deploy bundle (same as build-release.sh but inline to avoid
          # the script's buildx detection which would duplicate the build)
          BUNDLE_DIR=deploy/bundle
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR"
          cp deploy/clawrig.tar.gz "$BUNDLE_DIR/"
          cp deploy/pi-setup.sh "$BUNDLE_DIR/"
          cp deploy/dnsmasq-captive.conf "$BUNDLE_DIR/"
          cp deploy/clawrig-avahi.service "$BUNDLE_DIR/"
          cp deploy/systemd/clawrig.service "$BUNDLE_DIR/"

          INSTALL_DIR=deploy/pi-gen/stage-clawrig/01-install-clawrig/files
          cp "$INSTALL_DIR/clawrig-updater-sudoers" "$BUNDLE_DIR/"
          if [ -f "$INSTALL_DIR/update-pubkey.pem" ]; then
            cp "$INSTALL_DIR/update-pubkey.pem" "$BUNDLE_DIR/"
          fi

          IDENTITY_DIR=deploy/pi-gen/stage-clawrig/03-configure-system/files
          cp "$IDENTITY_DIR/clawrig-assign-identity.sh" "$BUNDLE_DIR/"
          cp "$IDENTITY_DIR/clawrig-assign-identity.service" "$BUNDLE_DIR/"

          WATCHDOG_DIR=deploy/pi-gen/stage-clawrig/04-configure-watchdog/files
          cp "$WATCHDOG_DIR"/clawrig-gateway-watchdog.* "$BUNDLE_DIR/"
          cp "$WATCHDOG_DIR"/clawrig-daily-repair.* "$BUNDLE_DIR/"
          cp "$WATCHDOG_DIR/diagnostic-schema.json" "$BUNDLE_DIR/"

      - name: Stage files for pi-gen
        run: |
          PIGEN_DIR=deploy/pi-gen
          mkdir -p "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files"
          mkdir -p "$PIGEN_DIR/stage-clawrig/02-configure-networking/files"

          cp deploy/bundle/clawrig.tar.gz \
             "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files/clawrig.tar.gz"
          cp deploy/bundle/clawrig.service \
             "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files/clawrig.service"
          cp deploy/bundle/dnsmasq-captive.conf \
             "$PIGEN_DIR/stage-clawrig/02-configure-networking/files/dnsmasq-captive.conf"
          cp deploy/bundle/clawrig-avahi.service \
             "$PIGEN_DIR/stage-clawrig/02-configure-networking/files/clawrig-avahi.service"

      - name: Clone pi-gen (arm64)
        run: |
          git clone --depth 1 --branch arm64 \
            https://github.com/RPi-Distro/pi-gen.git deploy/pi-gen/pi-gen-repo

      - name: Prepare pi-gen
        run: |
          PIGEN_DIR=deploy/pi-gen
          PIGEN_REPO="$PIGEN_DIR/pi-gen-repo"

          cp "$PIGEN_DIR/config" "$PIGEN_REPO/config"
          rm -rf "$PIGEN_REPO/stage-clawrig"
          cp -a "$PIGEN_DIR/stage-clawrig" "$PIGEN_REPO/stage-clawrig"

          for stage in stage0 stage1 stage2; do
            touch "$PIGEN_REPO/$stage/SKIP_IMAGES"
          done

      - name: Build Pi OS image
        run: |
          cd deploy/pi-gen/pi-gen-repo
          PRESERVE_CONTAINER=1 ./build-docker.sh

      - name: Sign release and generate OTA manifest
        run: |
          echo "${{ secrets.OTA_SIGNING_KEY }}" | base64 -d > /tmp/signing-key.pem
          chmod 600 /tmp/signing-key.pem
          bash deploy/sign-release.sh deploy/bundle/clawrig.tar.gz "$CLAWRIG_VERSION" /tmp/signing-key.pem
          rm -f /tmp/signing-key.pem

      - name: Prepare release assets
        run: |
          TAG="v${CLAWRIG_VERSION}"
          IMG_ZIP=$(ls deploy/pi-gen/pi-gen-repo/deploy/image_*.zip)
          ASSET_NAME="clawrig-${TAG}-arm64.img.zip"
          cp "$IMG_ZIP" "$ASSET_NAME"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        id: assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.assets.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(env.CLAWRIG_VERSION, '-') }}
          files: |
            ${{ steps.assets.outputs.asset_path }}
            deploy/bundle/clawrig.tar.gz
            deploy/bundle/manifest.json
