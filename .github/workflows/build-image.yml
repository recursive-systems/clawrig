name: Build Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0-rc.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin repo access token
        run: |
          if [ -z "${{ secrets.CLAWRIG_PLUGIN_REPO_TOKEN }}" ]; then
            echo "::error::Set CLAWRIG_PLUGIN_REPO_TOKEN with read access to recursive-systems/openclaw-plugin-clawrig"
            exit 1
          fi

      - name: Check out ClawRig plugin
        uses: actions/checkout@v4
        with:
          repository: recursive-systems/openclaw-plugin-clawrig
          path: clawrig-plugin
          token: ${{ secrets.CLAWRIG_PLUGIN_REPO_TOKEN }}

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.2"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version from tag or input
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "CLAWRIG_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "CLAWRIG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-arm64-${{ hashFiles('mix.lock') }}
          restore-keys: docker-arm64-

      - name: Install Elixir deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Elixir test suite
        run: mix test

      - name: Build ARM64 Elixir release
        env:
          CLAWRIG_PLUGIN_DIR: ${{ github.workspace }}/clawrig-plugin
        run: |
          bash deploy/build-release.sh

      - name: Assert Browser Use plugin is bundled
        run: |
          tar tzf deploy/bundle/clawrig.tar.gz | grep -q 'clawrig/plugins/clawrig/bin/clawrig-browser-use'
          tar tzf deploy/bundle/clawrig.tar.gz | grep -q 'clawrig/plugins/clawrig/skills/clawrig-browser-use/SKILL.md'

      - name: Stage files for pi-gen
        run: |
          PIGEN_DIR=deploy/pi-gen
          mkdir -p "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files"
          mkdir -p "$PIGEN_DIR/stage-clawrig/02-configure-networking/files"

          cp deploy/bundle/clawrig.tar.gz \
             "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files/clawrig.tar.gz"
          cp deploy/bundle/clawrig.service \
             "$PIGEN_DIR/stage-clawrig/01-install-clawrig/files/clawrig.service"
          cp deploy/bundle/dnsmasq-captive.conf \
             "$PIGEN_DIR/stage-clawrig/02-configure-networking/files/dnsmasq-captive.conf"
          cp deploy/bundle/clawrig-avahi.service \
             "$PIGEN_DIR/stage-clawrig/02-configure-networking/files/clawrig-avahi.service"

      - name: Clone pi-gen (arm64)
        run: |
          git clone --depth 1 --branch arm64 \
            https://github.com/RPi-Distro/pi-gen.git deploy/pi-gen/pi-gen-repo

      - name: Prepare pi-gen
        run: |
          PIGEN_DIR=deploy/pi-gen
          PIGEN_REPO="$PIGEN_DIR/pi-gen-repo"

          cp "$PIGEN_DIR/config" "$PIGEN_REPO/config"
          rm -rf "$PIGEN_REPO/stage-clawrig"
          cp -a "$PIGEN_DIR/stage-clawrig" "$PIGEN_REPO/stage-clawrig"

          for stage in stage0 stage1 stage2; do
            touch "$PIGEN_REPO/$stage/SKIP_IMAGES"
          done

      - name: Build Pi OS image
        run: |
          cd deploy/pi-gen/pi-gen-repo
          PRESERVE_CONTAINER=1 ./build-docker.sh

      - name: Sign release and generate OTA manifest
        run: |
          echo "${{ secrets.OTA_SIGNING_KEY }}" | base64 -d > /tmp/signing-key.pem
          chmod 600 /tmp/signing-key.pem
          bash deploy/sign-release.sh deploy/bundle/clawrig.tar.gz "$CLAWRIG_VERSION" /tmp/signing-key.pem
          rm -f /tmp/signing-key.pem

      - name: Check signing key expiry
        run: |
          echo "${{ secrets.OTA_SIGNING_KEY }}" | base64 -d > /tmp/signing-key.pem
          # If the key is an X.509 cert, check expiry; if raw PEM key, skip
          if openssl x509 -noout -in /tmp/signing-key.pem 2>/dev/null; then
            EXPIRY=$(openssl x509 -enddate -noout -in /tmp/signing-key.pem | cut -d= -f2)
            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
            NOW_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
            echo "Signing certificate expires in $DAYS_LEFT days ($EXPIRY)"
            if [ "$DAYS_LEFT" -lt 90 ]; then
              echo "::error::Signing certificate expires in $DAYS_LEFT days (< 90). Rotate the key!"
              exit 1
            fi
            if [ "$DAYS_LEFT" -lt 180 ]; then
              echo "::warning::Signing certificate expires in $DAYS_LEFT days. Plan key rotation."
            fi
          else
            echo "Signing key is a raw PEM key (no X.509 cert). Skipping expiry check."
          fi
          rm -f /tmp/signing-key.pem

      - name: Prepare release assets
        run: |
          TAG="v${CLAWRIG_VERSION}"
          IMG_ZIP=$(ls deploy/pi-gen/pi-gen-repo/deploy/image_*.zip)
          ASSET_NAME="clawrig-${TAG}-arm64.img.zip"
          cp "$IMG_ZIP" "$ASSET_NAME"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        id: assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.assets.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(env.CLAWRIG_VERSION, '-') }}
          files: |
            ${{ steps.assets.outputs.asset_path }}
            deploy/bundle/clawrig.tar.gz
            deploy/bundle/manifest.json
